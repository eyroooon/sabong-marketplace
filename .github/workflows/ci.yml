name: CI

on:
  push:
    branches: [main, brave-proskuriakova]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sabong/shared build

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm --filter @sabong/api build

      - name: Build Web
        run: pnpm --filter @sabong/web build
        env:
          NEXT_PUBLIC_API_URL: https://api.sabongmarket.ph/api
