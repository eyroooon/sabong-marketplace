name: CI

on:
  push:
    branches: [main, master, brave-proskuriakova, claude/brave-proskuriakova]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sabong/shared build

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build API
        run: pnpm --filter @sabong/api build

      - name: Build Web
        run: pnpm --filter @sabong/web build
        env:
          NEXT_PUBLIC_API_URL: https://api.bloodlineph.com/api

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sabong/shared build

      - name: API unit tests (Jest)
        run: pnpm --filter @sabong/api test

      - name: Web unit tests (Vitest)
        run: pnpm --filter @sabong/web test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
